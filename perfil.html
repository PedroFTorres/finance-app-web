<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Perfil - Arolix</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="login-wrapper">
  <div class="login-box">

 <img id="avatar-preview"
     src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
     style="width:100px;height:100px;border-radius:50%;margin-bottom:20px;object-fit:cover;">
    <input type="file" id="avatar-file" class="full" accept="image/jpeg,image/png,image/webp">

    <input id="profile-nome" type="text" placeholder="Nome completo" class="full" autocomplete="name" maxlength="120">
    <input id="profile-email" type="email" disabled class="full">
    <input id="profile-cpf" type="text" placeholder="CPF" class="full" inputmode="numeric" maxlength="14">

    <p style="margin-top:15px;">
      <strong>Plano:</strong> <span id="profile-plano"></span>
    </p>

    <div class="mfa-card">
      <h3>Segurança da conta</h3>
      <p class="mfa-description">
        Ative a verificação em duas etapas usando o Google Authenticator.
      </p>

      <p class="mfa-status-line">
        <strong>Status MFA:</strong> <span id="mfa-status">Verificando...</span>
      </p>

      <button id="start-mfa" class="btn-primary full">
        Ativar verificação em duas etapas
      </button>

      <button id="disable-mfa" class="btn-secondary full hidden">
        Desativar verificação em duas etapas
      </button>

      <div id="mfa-setup" class="mfa-setup hidden">
        <p class="mfa-description">
          1. Escaneie o QR Code no Google Authenticator.<br>
          2. Digite o código de 6 dígitos para confirmar.
        </p>

        <img id="mfa-qr" class="mfa-qr" alt="QR Code do MFA">

        <p class="mfa-description">
          Se não conseguir escanear, use esta chave manual:
        </p>

        <code id="mfa-secret" class="mfa-secret"></code>

        <input
          id="mfa-verify-code"
          type="text"
          inputmode="numeric"
          autocomplete="one-time-code"
          placeholder="Código de 6 dígitos"
          class="full"
          maxlength="6"
        >

        <button id="confirm-mfa-setup" class="btn-primary full">
          Confirmar MFA
        </button>

        <button id="cancel-mfa-setup" class="btn-secondary full">
          Cancelar ativação
        </button>
      </div>

      <p id="mfa-profile-msg" class="msg"></p>
    </div>

    <button id="save-profile" class="btn-primary full">
      Salvar Alterações
    </button>

    <p id="profile-msg" class="msg"></p>

    <button onclick="window.location.href='app.html'"
            class="btn-secondary full"
            style="margin-top:15px;">
      Voltar
    </button>

  </div>
</div>

<script src="vendor/supabase-2.108.2.js"></script>
<script src="config.js"></script>
<script src="supabase.js"></script>
<script src="security.js?v=20260702-1"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const { data: profile } = await supabase
    .from("user_profiles")
    .select("*")
    .eq("id", user.id)
    .maybeSingle()

  const avatarPreview = document.getElementById("avatar-preview");
  const avatarFile = document.getElementById("avatar-file");

  document.getElementById("profile-nome").value = profile?.nome || "";
  document.getElementById("profile-email").value = user.email;
  document.getElementById("profile-cpf").value = profile?.cpf || "";
  document.getElementById("profile-plano").textContent = profile?.plano || "free";

  if (profile?.avatar_url) {
    avatarPreview.src = profile.avatar_url;
  }

  // ======================
  // MFA / AUTENTICADOR
  // ======================

  let pendingMfaFactorId = null;

  const mfaStatus = document.getElementById("mfa-status");
  const startMfa = document.getElementById("start-mfa");
  const disableMfa = document.getElementById("disable-mfa");
  const mfaSetup = document.getElementById("mfa-setup");
  const mfaQr = document.getElementById("mfa-qr");
  const mfaSecret = document.getElementById("mfa-secret");
  const mfaVerifyCode = document.getElementById("mfa-verify-code");
  const confirmMfaSetup = document.getElementById("confirm-mfa-setup");
  const cancelMfaSetup = document.getElementById("cancel-mfa-setup");
  const mfaProfileMsg = document.getElementById("mfa-profile-msg");

  function normalizeOtpCode(code) {
    return String(code || "").replace(/\D/g, "").slice(0, 6);
  }

  function setMfaMessage(text, isSuccess = false) {
    mfaProfileMsg.style.color = isSuccess ? "green" : "red";
    mfaProfileMsg.textContent = text;
  }

  function setButtonLoading(button, isLoading, loadingText, defaultText) {
    if (!button) return;
    button.disabled = isLoading;
    button.textContent = isLoading ? loadingText : defaultText;
  }

  function renderQrCode(qrCode) {
    if (!qrCode) {
      mfaQr.removeAttribute("src");
      return;
    }

    if (qrCode.trim().startsWith("<svg")) {
      mfaQr.src = `data:image/svg+xml;utf8,${encodeURIComponent(qrCode)}`;
      return;
    }

    mfaQr.src = qrCode;
  }

  async function listTotpFactors() {
    const { data, error } = await supabase.auth.mfa.listFactors();

    if (error) {
      throw error;
    }

    return data?.totp || [];
  }

  async function getVerifiedTotpFactor() {
    const factors = await listTotpFactors();
    return factors.find((factor) => factor.status === "verified") || null;
  }

  async function removeUnverifiedTotpFactors() {
    const factors = await listTotpFactors();
    const unverifiedFactors = factors.filter(
      (factor) => factor.status !== "verified"
    );

    for (const factor of unverifiedFactors) {
      await supabase.auth.mfa.unenroll({ factorId: factor.id });
    }
  }

  async function loadMfaStatus() {
    try {
      const verifiedFactor = await getVerifiedTotpFactor();

      if (verifiedFactor) {
        mfaStatus.textContent = "Ativo";
        mfaStatus.style.color = "green";
        startMfa.classList.add("hidden");
        disableMfa.classList.remove("hidden");
        mfaSetup.classList.add("hidden");
        return;
      }

      mfaStatus.textContent = "Desativado";
      mfaStatus.style.color = "#777";
      startMfa.classList.remove("hidden");
      disableMfa.classList.add("hidden");
    } catch (error) {
      mfaStatus.textContent = "Não foi possível verificar";
      setMfaMessage(error.message || "Erro ao verificar MFA.");
    }
  }

  if (mfaVerifyCode) {
    mfaVerifyCode.addEventListener("input", () => {
      mfaVerifyCode.value = normalizeOtpCode(mfaVerifyCode.value);
    });

    mfaVerifyCode.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        confirmMfaSetup?.click();
      }
    });
  }

  if (startMfa) {
    startMfa.onclick = async () => {
      if (startMfa.disabled) return;

      setMfaMessage("");
      setButtonLoading(
        startMfa,
        true,
        "Preparando...",
        "Ativar verificação em duas etapas"
      );

      try {
        const existingFactor = await getVerifiedTotpFactor();

        if (existingFactor) {
          setMfaMessage("MFA já está ativo nesta conta.", true);
          await loadMfaStatus();
          return;
        }

        await removeUnverifiedTotpFactors();

        const { data, error } = await supabase.auth.mfa.enroll({
          factorType: "totp",
          friendlyName: "Arolix"
        });

        if (error) {
          throw error;
        }

        pendingMfaFactorId = data.id;
        renderQrCode(data?.totp?.qr_code);
        mfaSecret.textContent = data?.totp?.secret || "";
        mfaVerifyCode.value = "";
        mfaSetup.classList.remove("hidden");
        mfaVerifyCode.focus();
        setMfaMessage(
          "Escaneie o QR Code e confirme com o código do app.",
          true
        );
      } catch (error) {
        setMfaMessage(error.message || "Não foi possível iniciar o MFA.");
      } finally {
        setButtonLoading(
          startMfa,
          false,
          "Preparando...",
          "Ativar verificação em duas etapas"
        );
      }
    };
  }

  if (confirmMfaSetup) {
    confirmMfaSetup.onclick = async () => {
      if (confirmMfaSetup.disabled) return;

      const code = normalizeOtpCode(mfaVerifyCode.value);

      if (!pendingMfaFactorId || code.length !== 6) {
        setMfaMessage("Digite o código de 6 dígitos.");
        return;
      }

      setButtonLoading(confirmMfaSetup, true, "Confirmando...", "Confirmar MFA");
      setMfaMessage("");

      try {
        const challenge = await supabase.auth.mfa.challenge({
          factorId: pendingMfaFactorId
        });

        if (challenge.error) {
          throw challenge.error;
        }

        const verify = await supabase.auth.mfa.verify({
          factorId: pendingMfaFactorId,
          challengeId: challenge.data.id,
          code
        });

        if (verify.error) {
          throw verify.error;
        }

        pendingMfaFactorId = null;
        setMfaMessage("MFA ativado com sucesso!", true);
        await loadMfaStatus();
      } catch (error) {
        setMfaMessage(error.message || "Código MFA inválido.");
      } finally {
        setButtonLoading(confirmMfaSetup, false, "Confirmando...", "Confirmar MFA");
      }
    };
  }

  if (cancelMfaSetup) {
    cancelMfaSetup.onclick = async () => {
      if (pendingMfaFactorId) {
        await supabase.auth.mfa.unenroll({ factorId: pendingMfaFactorId });
      }

      pendingMfaFactorId = null;
      mfaSetup.classList.add("hidden");
      setMfaMessage("Ativação de MFA cancelada.");
      await loadMfaStatus();
    };
  }

  if (disableMfa) {
    disableMfa.onclick = async () => {
      if (disableMfa.disabled) return;

      const confirmed = window.confirm(
        "Tem certeza que deseja desativar a verificação em duas etapas?"
      );

      if (!confirmed) return;

      setButtonLoading(
        disableMfa,
        true,
        "Desativando...",
        "Desativar verificação em duas etapas"
      );
      setMfaMessage("");

      try {
        const verifiedFactor = await getVerifiedTotpFactor();

        if (!verifiedFactor) {
          setMfaMessage("Nenhum MFA ativo foi encontrado.");
          await loadMfaStatus();
          return;
        }

        const { error } = await supabase.auth.mfa.unenroll({
          factorId: verifiedFactor.id
        });

        if (error) {
          throw error;
        }

        setMfaMessage("MFA desativado com sucesso.", true);
        await loadMfaStatus();
      } catch (error) {
        setMfaMessage(
          error.message ||
          "Não foi possível desativar. Faça login novamente com MFA e tente outra vez."
        );
      } finally {
        setButtonLoading(
          disableMfa,
          false,
          "Desativando...",
          "Desativar verificação em duas etapas"
        );
      }
    };
  }

  await loadMfaStatus();

  // ======================// UPLOAD AVATAR// ======================

  avatarFile.addEventListener("change", async (event) => {

    const file = event.target.files[0];
    if (!file) return;

    const maxAvatarBytes = 2 * 1024 * 1024;
    const extensionsByMime = {
      "image/jpeg": "jpg",
      "image/png": "png",
      "image/webp": "webp"
    };
    const fileExt = extensionsByMime[file.type];

    if (!fileExt) {
      alert("Formato inválido. Envie uma imagem JPG, PNG ou WEBP.");
      avatarFile.value = "";
      return;
    }

    if (file.size > maxAvatarBytes) {
      alert("A imagem deve ter no máximo 2 MB.");
      avatarFile.value = "";
      return;
    }

    try {
      const bitmap = await createImageBitmap(file);
      const dimensionsAreValid =
        bitmap.width > 0 && bitmap.height > 0 &&
        bitmap.width <= 4096 && bitmap.height <= 4096;
      bitmap.close();

      if (!dimensionsAreValid) {
        throw new Error("Invalid image dimensions");
      }
    } catch (_error) {
      alert("O arquivo não é uma imagem válida ou possui dimensões muito grandes.");
      avatarFile.value = "";
      return;
    }

  const fileName = `${user.id}/${Date.now()}.${fileExt}`;

   const { error: uploadError } = await supabase.storage
  .from("avatars")
  .upload(fileName, file, {
    upsert: false,
    contentType: file.type,
    cacheControl: "3600"
  });

    if (uploadError) {
      alert(uploadError.message);
      return;
    }

    const { data } = supabase.storage
      .from("avatars")
      .getPublicUrl(fileName);

    const { error: profileError } = await supabase
      .from("user_profiles")
      .update({ avatar_url: data.publicUrl })
      .eq("id", user.id);

    if (profileError) {
      await supabase.storage.from("avatars").remove([fileName]);
      alert("Não foi possível atualizar o avatar.");
      return;
    }

    avatarPreview.src = `${data.publicUrl}?t=${Date.now()}`;
  });

  // ======================
  // SALVAR PERFIL
  // ======================

  document.getElementById("save-profile").onclick = async () => {

    const nome = document.getElementById("profile-nome").value.trim();
    const cpf = document.getElementById("profile-cpf").value.trim();
    const msg = document.getElementById("profile-msg");

    const { error } = await supabase
      .from("user_profiles")
      .update({
        nome,
        cpf,
        updated_at: new Date()
      })
      .eq("id", user.id);

    if (error) {
      msg.textContent = error.message;
      return;
    }

    msg.style.color = "green";
    msg.textContent = "Perfil atualizado com sucesso!";
  };

});
</script>

</body>
</html>
