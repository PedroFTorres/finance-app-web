<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Perfil - Arolix</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="login-wrapper">
  <div class="login-box">

 <img id="avatar-preview"
     src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
     style="width:100px;height:100px;border-radius:50%;margin-bottom:20px;object-fit:cover;">
    <input type="file" id="avatar-file" class="full" accept="image/jpeg,image/png,image/webp">

    <input id="profile-nome" type="text" placeholder="Nome completo" class="full" autocomplete="name" maxlength="120">
    <input id="profile-email" type="email" disabled class="full">
    <input id="profile-cpf" type="text" placeholder="CPF" class="full" inputmode="numeric" maxlength="14">

    <p style="margin-top:15px;">
      <strong>Plano:</strong> <span id="profile-plano"></span>
    </p>

    <button id="save-profile" class="btn-primary full">
      Salvar Alterações
    </button>

    <p id="profile-msg" class="msg"></p>

    <button onclick="window.location.href='app.html'"
            class="btn-secondary full"
            style="margin-top:15px;">
      Voltar
    </button>

  </div>
</div>

<script src="vendor/supabase-2.108.2.js"></script>
<script src="config.js"></script>
<script src="supabase.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const { data: profile } = await supabase
    .from("user_profiles")
    .select("*")
    .eq("id", user.id)
    .maybeSingle()

  const avatarPreview = document.getElementById("avatar-preview");
  const avatarFile = document.getElementById("avatar-file");

  document.getElementById("profile-nome").value = profile?.nome || "";
  document.getElementById("profile-email").value = user.email;
  document.getElementById("profile-cpf").value = profile?.cpf || "";
  document.getElementById("profile-plano").textContent = profile?.plano || "free";

  if (profile?.avatar_url) {
    avatarPreview.src = profile.avatar_url;
  }

  // ======================// UPLOAD AVATAR// ======================

  avatarFile.addEventListener("change", async (event) => {

    const file = event.target.files[0];
    if (!file) return;

    const maxAvatarBytes = 2 * 1024 * 1024;
    const extensionsByMime = {
      "image/jpeg": "jpg",
      "image/png": "png",
      "image/webp": "webp"
    };
    const fileExt = extensionsByMime[file.type];

    if (!fileExt) {
      alert("Formato inválido. Envie uma imagem JPG, PNG ou WEBP.");
      avatarFile.value = "";
      return;
    }

    if (file.size > maxAvatarBytes) {
      alert("A imagem deve ter no máximo 2 MB.");
      avatarFile.value = "";
      return;
    }

    try {
      const bitmap = await createImageBitmap(file);
      const dimensionsAreValid =
        bitmap.width > 0 && bitmap.height > 0 &&
        bitmap.width <= 4096 && bitmap.height <= 4096;
      bitmap.close();

      if (!dimensionsAreValid) {
        throw new Error("Invalid image dimensions");
      }
    } catch (_error) {
      alert("O arquivo não é uma imagem válida ou possui dimensões muito grandes.");
      avatarFile.value = "";
      return;
    }

  const fileName = `${user.id}/${Date.now()}.${fileExt}`;

   const { error: uploadError } = await supabase.storage
  .from("avatars")
  .upload(fileName, file, {
    upsert: false,
    contentType: file.type,
    cacheControl: "3600"
  });

    if (uploadError) {
      alert(uploadError.message);
      return;
    }

    const { data } = supabase.storage
      .from("avatars")
      .getPublicUrl(fileName);

    const { error: profileError } = await supabase
      .from("user_profiles")
      .update({ avatar_url: data.publicUrl })
      .eq("id", user.id);

    if (profileError) {
      await supabase.storage.from("avatars").remove([fileName]);
      alert("Não foi possível atualizar o avatar.");
      return;
    }

    avatarPreview.src = `${data.publicUrl}?t=${Date.now()}`;
  });

  // ======================
  // SALVAR PERFIL
  // ======================

  document.getElementById("save-profile").onclick = async () => {

    const nome = document.getElementById("profile-nome").value.trim();
    const cpf = document.getElementById("profile-cpf").value.trim();
    const msg = document.getElementById("profile-msg");

    const { error } = await supabase
      .from("user_profiles")
      .update({
        nome,
        cpf,
        updated_at: new Date()
      })
      .eq("id", user.id);

    if (error) {
      msg.textContent = error.message;
      return;
    }

    msg.style.color = "green";
    msg.textContent = "Perfil atualizado com sucesso!";
  };

});
</script>

</body>
</html>
